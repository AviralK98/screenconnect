[server]
host = "0.0.0.0"
port = 8765
web_port = 8080   # mobile web viewer (browse here from your phone)

[tls]
enabled = false
cert_file = "certs/agent.crt"
key_file  = "certs/agent.key"
# ca_file = ""

[auth]
mode  = "token"
token = "change-this-token"

[screen]
fps          = 15
jpeg_quality = 82
monitor_index = 0
# Output resolution. scale_mode: "off" (native) | "fit" (FHD, keep aspect) |
# "stretch" (force exact target, may distort).
scale_mode    = "off"
target_width  = 1920
target_height = 1080

[files]
drop_dir = "~/Downloads/screenconnect"

[logging]
level = "INFO"
